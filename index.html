<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TweakVault | پایگاه زیرساخت و تونلینگ هوشمند</title>
    <meta name="description" content="پایگاه زیرساختی TweakVault. ارائه‌دهنده راهکارهای هوشمند و پایدار شبکه، تانل اختصاصی و سرورهای پرسرعت.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117; --main-accent: #58a6ff; --main-glow: rgba(88, 166, 255, 0.4);
            --success-color: #238636; --warning-color: #e3b341; --text-color: #c9d1d9;
            --muted-text: #8b949e; --box-bg: rgba(13, 17, 23, 0.85); --border-color: rgba(48, 54, 61, 0.8);
            --badge-bg: #161b22; --ping-bg: rgba(0, 0, 0, 0.5); --news-bg: rgba(0, 0, 0, 0.4);
        }

        body.light-mode {
            --bg-color: #f0f4f8; --text-color: #1a202c; --muted-text: #4a5568;
            --box-bg: rgba(255, 255, 255, 0.9); --border-color: rgba(203, 213, 225, 0.8);
            --badge-bg: #f8fafc; --ping-bg: rgba(226, 232, 240, 0.7); --news-bg: rgba(255, 255, 255, 0.6);
            --main-glow: rgba(88, 166, 255, 0.2);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Vazirmatn', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; background-image: radial-gradient(circle, rgba(128, 128, 128, 0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px; transition: background-color 0.4s ease, color 0.4s ease;
        }

        .theme-toggle {
            position: fixed; bottom: 25px; left: 25px; width: 50px; height: 50px; border-radius: 50%;
            background: var(--box-bg); border: 1px solid var(--border-color); color: var(--text-color);
            font-size: 22px; cursor: pointer; z-index: 999; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease; display: flex; justify-content: center; align-items: center;
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(15deg); border-color: var(--main-accent); }

        #network-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; transition: opacity 0.4s ease; }
        body.light-mode #network-bg { filter: invert(1); opacity: 0.05; }
        .glow-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80%; background: radial-gradient(circle, rgba(88, 166, 255, 0.08) 0%, transparent 70%); z-index: 0; pointer-events: none; }

        .container {
            max-width: 800px; width: 95%; margin: 40px 0; padding: 35px 30px; background: var(--box-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--border-color); border-radius: 16px; text-align: center; position: relative; z-index: 1;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(88, 166, 255, 0.02); transition: all 0.4s ease;
        }
        .container::before { content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--main-accent), transparent); border-top-left-radius: 16px; border-top-right-radius: 16px; }

        .stats-bar { display: flex; justify-content: center; gap: 45px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-color); }
        .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .stat-label { font-size: 11px; color: var(--muted-text); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: monospace, Tahoma, sans-serif; font-size: 22px; font-weight: bold; color: var(--main-accent); text-shadow: 0 0 15px var(--main-glow); direction: ltr; }

        .logo-box { width: 130px; height: 130px; border-radius: 50%; border: 2px solid var(--main-accent); margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px var(--main-glow); overflow: hidden; background-color: #000; }
        .logo { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: var(--main-accent); font-size: 24px; margin-bottom: 15px; text-shadow: 0 0 12px var(--main-glow); }
        p { font-size: 15px; line-height: 1.8; color: var(--muted-text); margin-bottom: 30px; }

        .news-container { background: var(--news-bg); border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 35px; padding: 15px; text-align: right; max-height: 200px; overflow-y: auto; position: relative; transition: all 0.4s ease; }
        .news-container::-webkit-scrollbar { width: 6px; } .news-container::-webkit-scrollbar-track { background: transparent; } .news-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; } .news-container::-webkit-scrollbar-thumb:hover { background: var(--main-accent); }
        .news-header { font-size: 14px; font-weight: bold; color: var(--main-accent); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .news-header::before { content: '⚡'; font-size: 16px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .news-item { border-right: 2px solid var(--main-accent); padding-right: 12px; margin-bottom: 15px; transition: all 0.3s ease; }
        .news-item:hover { background: rgba(88, 166, 255, 0.05); border-right-color: #fff; }
        body.light-mode .news-item:hover { border-right-color: #000; }
        .news-item:last-child { margin-bottom: 0; }
        .news-date { font-size: 11px; color: var(--muted-text); font-family: monospace, sans-serif; margin-bottom: 5px; display: block; direction: ltr; text-align: right; }
        .news-text { font-size: 13.5px; color: var(--text-color); line-height: 1.6; }

        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .badge { background-color: var(--badge-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .badge:hover { border-color: var(--main-accent); box-shadow: 0 5px 15px var(--main-glow); transform: translateY(-2px); }
        .badge-title { font-size: 13px; font-weight: bold; text-align: center; line-height: 1.4; color: var(--text-color);}
        
        .ping-box { font-size: 12px; font-family: monospace, Tahoma, sans-serif; font-weight: bold; direction: ltr; background: var(--ping-bg); padding: 5px 15px; border-radius: 6px; width: 85%; text-align: center; border: 1px solid var(--border-color); letter-spacing: 1px; transition: all 0.3s ease; }
        .ping-excellent { color: #39d353; text-shadow: 0 0 8px rgba(57, 211, 83, 0.4); border-color: rgba(57, 211, 83, 0.3); }
        .ping-good { color: #85d614; text-shadow: 0 0 5px rgba(166, 226, 46, 0.2); }
        .ping-fair { color: #e3b341; text-shadow: 0 0 5px rgba(227, 179, 65, 0.2); }
        body.light-mode .ping-excellent { color: #1a7f37; text-shadow: none; border-color: #1a7f37; }
        body.light-mode .ping-good { color: #619a0a; text-shadow: none; }
        body.light-mode .ping-fair { color: #9a6700; text-shadow: none; }

        .badge-ad { background: rgba(227, 179, 65, 0.05); border-color: rgba(227, 179, 65, 0.3); }
        .badge-ad .badge-title { color: var(--warning-color); }
        .badge-ad .ping-box { color: var(--muted-text); background: transparent; border: 1px dashed rgba(227, 179, 65, 0.5); font-family: 'Vazirmatn', sans-serif; font-weight: normal; font-size: 11px; text-shadow: none; }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn { font-family: 'Vazirmatn', sans-serif; display: inline-block; background-color: #a38235; color: #000; text-decoration: none; padding: 15px 25px; border-radius: 8px; font-weight: bold; font-size: 15px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(163, 130, 53, 0.25); position: relative; overflow: hidden; flex: 1; min-width: 200px; }
        .btn::after { content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent); transform: skewX(-25deg); transition: left 0.6s ease-in-out; }
        .btn:hover { background-color: #ba994c; box-shadow: 0 6px 20px rgba(163, 130, 53, 0.5); transform: translateY(-2px); }
        .btn:hover::after { left: 150%; }

        .status-panel { margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 25px; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 50px; }
        #cpr-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.35; -webkit-mask-image: linear-gradient(90deg, transparent, black 15%, black 85%, transparent); mask-image: linear-gradient(90deg, transparent, black 15%, black 85%, transparent); }
        .status-content { position: relative; z-index: 2; display: flex; justify-content: center; gap: 20px; width: 100%; flex-wrap: wrap; background: var(--box-bg); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; color: var(--text-color); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--success-color); box-shadow: 0 0 8px var(--success-color); animation: pulse 2s infinite; }

        @media (max-width: 600px) {
            .container { padding: 25px 15px; margin: 20px 0; width: 100%; border-radius: 0; border-left: none; border-right: none;}
            .stats-bar { gap: 20px; } .features { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; padding: 0 10px; } .btn { width: auto; }
            .status-content { flex-direction: column; gap: 12px; align-items: center; }
            .theme-toggle { bottom: 15px; left: 15px; width: 45px; height: 45px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-btn" title="تغییر تم تاریک/روشن">🌓</button>

    <svg id="network-bg" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
        <defs><radialGradient id="grad1" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:rgb(88,166,255);stop-opacity:1" /><stop offset="100%" style="stop-color:rgb(13,17,23);stop-opacity:1" /></radialGradient></defs>
        <rect width="100%" height="100%" fill="transparent"/>
        <g stroke="#30363d" stroke-width="0.5"><path d="M100 100 L900 100 L900 900 L100 900 Z" fill="none"/><path d="M500 100 L500 900 M100 500 L900 500" fill="none"/><circle cx="500" cy="500" r="2" fill="#58a6ff"/><circle cx="200" cy="200" r="1.5" fill="#58a6ff"/><circle cx="800" cy="800" r="1.5" fill="#58a6ff"/></g>
    </svg>
    <div class="glow-bg"></div>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-label">امروز</span><span class="stat-value" id="stat-daily">--</span></div>
            <div class="stat-item"><span class="stat-label">این ماه</span><span class="stat-value" id="stat-monthly">--</span></div>
            <div class="stat-item"><span class="stat-label">کل بازدید</span><span class="stat-value" id="stat-total">--</span></div>
        </div>

        <div class="logo-box"><img src="logo.jpg" alt="TweakVault Logo" class="logo"></div>
        <h1>TweakVault - پایگاه زیرساخت و تونلینگ هوشمند</h1>
        
        <div class="news-container">
            <div class="news-header">بولتن اطلاعیه‌های زنده شبکه</div>
            <div id="news-content">
                <div class="news-item"><span class="news-date">در حال همگام‌سازی با سرور... ⏳</span><div class="news-text" style="color: var(--muted-text)">لطفاً چند لحظه منتظر بمانید.</div></div>
            </div>
        </div>

        <div class="features" id="servers-container"></div>

        <div class="btn-group">
            <a href="https://t.me/TweakVault_bot" class="btn" target="_blank">ثبت سفارش (بات هوشمند)</a>
            <a href="https://t.me/TweakVaultVPN" class="btn" target="_blank">ورود به کانال تلگرام</a>
            <a href="https://x.com/TweakVault" class="btn" target="_blank">صفحه رسمی توییتر (X)</a>
        </div>

        <div class="status-panel">
            <canvas id="cpr-canvas"></canvas>
            <div class="status-content">
                <div class="status-item"><div class="dot"></div> وضعیت شبکه: پایدار</div>
                <div class="status-item"><div class="dot"></div> هسته مرکزی (DE): متصل</div>
                <div class="status-item"><div class="dot"></div> لاین تانل (IR): فعال</div>
            </div>
        </div>
    </div>

    <script>
        // ❌ در این خط، به جای عبارت yourname.workers.dev آدرس دقیق ورکر خودت را وارد کن و حتماً با /api/data تمام شود ❌
        const API_URL = "https://api.tweakvault.ir/api/data";

        let appData = { news: [], servers: [], ads: [] };

        function getPingClass(pingValue) {
            if (pingValue <= 80) return "ping-excellent";
            if (pingValue <= 150) return "ping-good";
            return "ping-fair";
        }

        function renderNews() {
            const container = document.getElementById('news-content');
            if (!appData.news || appData.news.length === 0) {
                container.innerHTML = `<div class="news-item"><div class="news-text" style="color: var(--muted-text)">در حال حاضر اطلاعیه‌ای ثبت نشده است.</div></div>`;
                return;
            }
            let html = '';
            appData.news.forEach(item => {
                let d = new Date(item.time);
                let dateStr = d.toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' });
                let timeStr = d.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
                html += `<div class="news-item"><span class="news-date">${timeStr} | ${dateStr} 🗓</span><div class="news-text">${item.text}</div></div>`;
            });
            container.innerHTML = html;
        }

        function renderServers() {
            const container = document.getElementById('servers-container');
            let html = '';
            if(appData.servers) {
                appData.servers.forEach(server => {
                    html += `<div class="badge"><div class="badge-title">${server.name}</div><div class="ping-box" id="ping-${server.id}">-- ms</div></div>`;
                });
            }
            if(appData.ads) {
                appData.ads.forEach(ad => {
                    html += `<div class="badge badge-ad"><div class="badge-title">${ad.name}</div><div class="ping-box">${ad.label}</div></div>`;
                });
            }
            container.innerHTML = html;
        }

        async function fetchLiveAppData() {
            try {
                // ترفند Cache-Buster برای جلوگیری از گیر کردن اطلاعات قدیمی در مرورگر
                const fetchUrl = API_URL + "?t=" + new Date().getTime();
                const response = await fetch(fetchUrl, {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache', 'Expires': '0' }
                });
                
                if (response.ok) {
                    appData = await response.json();
                    renderNews(); renderServers();
                }
            } catch (error) {
                console.log("خطا در دریافت دیتا");
            }
        }
        
        fetchLiveAppData();

        function getRandomPing(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function updatePings() {
            if(!appData.servers) return;
            appData.servers.forEach(server => {
                let el = document.getElementById(`ping-${server.id}`);
                if (el) {
                    let ping = getRandomPing(server.minPing, server.maxPing);
                    el.innerText = `${ping} ms`;
                    el.className = `ping-box ${getPingClass(ping)}`;
                }
            });
        }
        setInterval(updatePings, 1500);

        function initStats() {
            const launchDate = new Date("2026-06-25T00:00:00").getTime();
            const now = new Date(); const nowTime = now.getTime();
            const diffTime = Math.max(0, nowTime - launchDate);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const diffHours = Math.floor(diffTime / (1000 * 60 * 60));
            const baseTotal = 240 + (diffHours * 3); const baseMonthly = 80 + (diffDays * 45);
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const minutesToday = Math.floor((nowTime - startOfDay) / (1000 * 60)); 
            const baseDaily = 12 + Math.floor(minutesToday / 15); 
            let localRefreshes = parseInt(localStorage.getItem('tv_local_refreshes')) || 0;
            let lastVisitDate = localStorage.getItem('tv_last_visit_date');
            let todayStr = now.toISOString().split('T')[0];
            if (lastVisitDate !== todayStr) { localRefreshes = 1; } else { localRefreshes += 1; }
            localStorage.setItem('tv_local_refreshes', localRefreshes);
            localStorage.setItem('tv_last_visit_date', todayStr);
            document.getElementById('stat-total').innerText = (baseTotal + localRefreshes).toLocaleString('en-US');
            document.getElementById('stat-monthly').innerText = (baseMonthly + localRefreshes).toLocaleString('en-US');
            document.getElementById('stat-daily').innerText = (baseDaily + localRefreshes).toLocaleString('en-US');
        }
        initStats();

        const themeBtn = document.getElementById('theme-btn');
        const body = document.body;
        if (localStorage.getItem('tv_theme') === 'light') { body.classList.add('light-mode'); themeBtn.innerText = '🌙'; }
        themeBtn.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) { localStorage.setItem('tv_theme', 'light'); themeBtn.innerText = '🌙'; } 
            else { localStorage.setItem('tv_theme', 'dark'); themeBtn.innerText = '🌓'; }
        });

        const canvas = document.getElementById('cpr-canvas');
        const ctx = canvas.getContext('2d');
        let width, height; let points = []; let tick = 0;

        function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; width = canvas.width; height = canvas.height; points = new Array(Math.floor(width / 4)).fill(height / 1.5); }
        window.addEventListener('resize', resizeCanvas); setTimeout(resizeCanvas, 100);

        function drawHeartbeat() {
            ctx.clearRect(0, 0, width, height); ctx.beginPath(); ctx.moveTo(0, points[0]);
            for (let i = 1; i < points.length; i++) { ctx.lineTo(i * 4, points[i]); }
            ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.shadowBlur = 8; ctx.shadowColor = '#58a6ff';
            points.shift(); tick++; let baseline = height / 1.5; let newPoint = baseline;
            if (tick % 80 > 70) { newPoint = baseline + (Math.random() - 0.5) * (height * 0.9); } else { newPoint = baseline + (Math.random() - 0.5) * 4; }
            points.push(newPoint); requestAnimationFrame(drawHeartbeat);
        }
        setTimeout(() => { drawHeartbeat(); }, 150);
    </script>
</body>
</html>
